[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py tc*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    official: Official AutomationExercise capstone test cases
    smoke: Mark test as a smoke test
    regression: Mark test as a regression test
    integration: Mark test as an integration test
    unit: Mark test as a unit test
    ui: Mark test as a UI test
    api: Mark test as an API test
    functional: Mark test as a functional test
    end_to_end: Mark test as an end-to-end test
    critical: Mark test as critical
    slow: Mark test as slow running
    parametrize: Mark test as parametrized

# Console output options
addopts = -v --tb=short --strict-markers --color=yes
    -p no:warnings
    -p no:doctest
    --alluredir=reports/allure-results
    --html=reports/test-report.html --self-contained-html

# Log settings
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Default suite
# The repository keeps extra exploratory tests, but the capstone deliverable is
# the official numbered AutomationExercise suite under tests/.
testpaths = tests
norecursedirs = .git .venv reports

# Timeout for tests (in seconds)
timeout = 300

# Asyncio mode
asyncio_mode = auto
